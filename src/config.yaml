site:
  name: Maxine Annel Pacheco-Ramírez
  site: 'https://maxineannelpachecoramirez.github.io'
  base: '/'
  trailingSlash: false
  googleSiteVerificationId: S0HiZjlcCDqp0qoKykHAG-yR32I3Em6NfAzfQGAejdE
# Default SEO metadata
metadata:
  title:
    default: Maxine Annel Pacheco-Ramírez | Neuroscience & Brain Research
    template: '%s — Maxine Annel'
  description: 'PhD researcher at IUCRC BRAIN Center, University of Houston. Using EEG technology to decode how the brain responds to music, dance, art, and human connection.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Maxine Annel Pacheco-Ramírez
    images:
      - url: '~/assets/images/max_polo.jpg'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@annelpacheco'
    site: '@annelpacheco'
    cardType: summary_large_image
i18n:
  language: en
  textDirection: ltr
apps:
  blog:
    isEnabled: true
    postsPerPage: 20
    post:
      isEnabled: true
      permalink: '/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true
    list:
      isEnabled: true
      pathname: 'blog' # Blog main path, you can change this to "articles" (/articles)
      robots:
        index: true
    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true
    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false
    isRelatedPostsEnabled: false
    relatedPostsCount: 4
analytics:
  vendors:
    googleAnalytics:
      id: 'G-Y2VW4GEK6T'
ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
